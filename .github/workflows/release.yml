name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish MedalSync/MedalSync.csproj `
            -c Release `
            -r win-x64 `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish

      - name: Create ZIP
        run: Compress-Archive -Path ./publish/MedalSync.exe -DestinationPath ./MedalSync-${{ github.ref_name }}-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: MedalSync-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
